<!DOCTYPE html>
<html>
<head>
    <title>樱花祝福</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        html,
        body {
            height: 100%;
            padding: 0;
            margin: 0;
            background: url(https://s41.ax1x.com/2026/04/05/peNEC4J.png);
            background-repeat: no-repeat;
            background-size: 100% 100%;
            position: relative;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
        }

        #sakura {
            position: absolute;
            z-index: 99;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            pointer-events: none;
        }

        /* ========== 容器扩大，爱心上移，文字保持不动 ========== */
        .ws {
            position: absolute;
            z-index: 100;
            left: 50%;
            /* 文字位置保持不动 */
            top: calc(50% + 210px);
            transform: translate(-50%, -50%);
            /* 高度从500px扩大到700px，给爱心上移空间 */
            width: 500px;
            height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 动态爱心Canvas - 向上移动 */
        #bigHeartCanvas {
            position: absolute;
            left: 0;
            /* 向上移动约三分之一（700px的1/3≈230px） */
            top: -100px;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        textarea::-webkit-input-placeholder {
            color: #8B0000;
        }

        #srk {
            width: 60%;
            height: auto;
            position: relative;
            border: none;
            outline: none;
            font-size: 26px;
            font-weight: bold;
            background: transparent;
            color: #8B0000;
            text-align: center;
            z-index: 99;
            resize: none;
            animation: textFlash 1.2s infinite alternate;
            text-shadow: 0 0 10px #722F37;
            pointer-events: auto;
            line-height: 1.5;
        }

        @keyframes textFlash {
            0% { 
                opacity: 0.6;
                text-shadow: 0 0 8px #722F37;
            }
            100% { 
                opacity: 1;
                text-shadow: 0 0 15px #722F37, 0 0 20px #8B0000;
            }
        }

        .audio-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            width: 40px;
            height: 40px;
            background: rgba(255, 153, 200, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="audio-btn" onclick="toggleAudio()">🎵</div>
    
    <audio id="bgMusic" loop>
        <source src="https://music.163.com/song/media/outer/url?id=2004404292.mp3" type="audio/mp3" />
    </audio>

    <div class="ws">
        <canvas id="bigHeartCanvas"></canvas>
        <textarea id="srk" cols="30" rows="10" placeholder="To吕慧琳，生日快乐     朝朝如意，岁岁平安"></textarea>
    </div>

    <canvas id="sakura"></canvas>
    <canvas id="heartCanvas" style="position:absolute;z-index:98;width:100%;height:100%;left:0;top:0;pointer-events:none;"></canvas>

            var particleRate = settings.particles.length / settings.particles.duration;
            var time;

                        canvas.height / 2 - pos.y * 0.8,

                particles.draw(context, image);

                canvas.height = parent.clientHeight;

    })();

    (function() {

        let hearts = [];
        let count = 40;

        class Heart {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * -100 - 10;
                this.r = Math.random() * 6 + 3;
                this.speed = Math.random() * 0.5 + 0.2;
                this.wind = Math.random() * 0.4 - 0.2;
                this.alpha = Math.random() * 0.6 + 0.3;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = "#ff5e99";
                ctx.beginPath();
                let x = this.x, y = this.y, r = this.r;

                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                if(this.y > h + this.r) {
                    this.y = Math.random() * -50 - 10;
                    this.x = Math.random() * w;
                }
            }
        }

        function init() {
            for(let i=0;i<count;i++) {
                hearts.push(new Heart());
                hearts[i].y = Math.random() * h - 50;
            }
        }
        function animate() {
            ctx.clearRect(0,0,w,h);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', () => {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        });
        init();
        animate();
    })();
